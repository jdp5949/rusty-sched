[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = [
    # `instant` is unmaintained but pulled in transitively by `notify` (file
    # watcher in v0.3.3). Remove once notify drops the dep.
    "RUSTSEC-2024-0384",
    # `rustls-pemfile` v1 is unmaintained but pulled in transitively by
    # `tonic` / `tokio-rustls` for mTLS (v0.5.2). Drop once tonic upgrades.
    "RUSTSEC-2025-0134",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "allow"
allow-wildcard-paths = true

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
