ShortDescription: Job scheduler with retries, triggers, and a built-in agent.
Description: |
  rusty-sched is a job scheduler written in Rust. It supports cron + interval
  + file + webhook triggers, retries, a built-in agent for distributed runs,
  and a sendevent CLI for manual interventions.
Moniker: rusty-sched
