syntax = "proto3";

package agent;

// Bi-directional streaming RPC between the rusty-sched server (client side)
// and a remote agent process (server side). Either side may send any
// `AgentMsg` / `ServerMsg` variant at any time; ordering within a single
// `run_id` is preserved by the underlying HTTP/2 stream.
service Agent {
  rpc Stream(stream AgentMsg) returns (stream ServerMsg) {}
}

// Messages an agent sends back to the scheduler.
message AgentMsg {
  oneof kind {
    LogChunk log = 1;
    Result result = 2;
    Heartbeat heartbeat = 3;
  }
}

// Messages the scheduler sends down to an agent.
message ServerMsg {
  oneof kind {
    Dispatch dispatch = 1;
    Kill kill = 2;
    Signal signal = 3;
    Heartbeat heartbeat = 4;
  }
}

message Dispatch {
  string run_id = 1;
  string cmd = 2;
  repeated string args = 3;
  map<string, string> env = 4;
  string cwd = 5;
  uint64 timeout_secs = 6;
}

message LogChunk {
  string run_id = 1;
  // 0 = stdout, 1 = stderr.
  uint32 stream = 2;
  int64 ts_unix_ms = 3;
  bytes bytes = 4;
}

message Result {
  string run_id = 1;
  int32 exit_code = 2;
  bool timed_out = 3;
  uint64 peak_rss_bytes = 4;
  uint64 cpu_user_ms = 5;
  uint64 cpu_sys_ms = 6;
}

message Heartbeat {}

message Kill {
  string run_id = 1;
}

message Signal {
  string run_id = 1;
  int32 sig = 2;
}
