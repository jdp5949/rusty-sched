<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rusty-sched</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Tailwind dark mode via `class` strategy. Pre-set the class before the body
  // paints so we never flash a light theme on dark-preferring users.
  tailwind.config = { darkMode: 'class' };
  (function () {
    var saved = localStorage.getItem('rsched_theme');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (saved === 'dark' || (!saved && prefersDark)) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .CodeMirror {
    height: 420px;
    font-size: 13px;
    border-radius: 0.375rem;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
  }
  .CodeMirror-gutters { background: #1e293b; border-right: 1px solid #334155; }
  .CodeMirror-linenumber { color: #475569; }
  .CodeMirror-cursor { border-left-color: #f97316; }
  .cm-s-default .cm-string { color: #86efac; }
  .cm-s-default .cm-number { color: #fb923c; }
  .cm-s-default .cm-atom { color: #818cf8; }
  .cm-s-default .cm-property { color: #7dd3fc; }
  .cm-s-default .cm-punctuation { color: #94a3b8; }
</style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors">
<div id="root"></div>

<script type="text/babel">
const API = "/api/v1";
const { useState, useEffect, useRef } = React;

function api(method, path, body) {
  return fetch(API + path, {
    method,
    credentials: "same-origin",
    headers: body ? { "content-type": "application/json" } : {},
    body: body ? JSON.stringify(body) : null,
  }).then(async r => {
    if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
    return r.status === 204 ? null : r.json();
  });
}

function Header() {
  return (
    <header className="bg-gradient-to-r from-orange-500 to-red-600 text-white px-6 py-4 shadow">
      <div className="max-w-6xl mx-auto flex items-center justify-between">
        <div className="flex items-center gap-2">
          <span className="text-2xl">⚙️</span>
          <h1 className="text-xl font-bold">rusty-sched</h1>
          <span className="text-orange-200 text-sm">job scheduler</span>
        </div>
        <a href="https://github.com/jdp5949/rusty-sched" className="text-sm hover:underline">★ GitHub</a>
      </div>
    </header>
  );
}

function NewJobForm({ onCreated }) {
  const [name, setName] = useState("");
  const [cron, setCron] = useState("*/5 * * * *");
  const [cmd, setCmd] = useState("echo hello");
  const [err, setErr] = useState(null);
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setErr(null);
    setBusy(true);
    try {
      await api("POST", "/jobs", {
        name,
        trigger: { kind: "cron", expr: cron },
        cmd,
      });
      setName("");
      onCreated();
    } catch (e) {
      setErr(e.message);
    } finally {
      setBusy(false);
    }
  }

  return (
    <form onSubmit={submit} className="bg-white border border-slate-200 rounded-xl p-5 mb-6 shadow-sm dark:bg-slate-900 dark:border-slate-800">
      <h2 className="font-semibold mb-3">Create job</h2>
      <div className="grid md:grid-cols-3 gap-3">
        <input className="border border-slate-300 rounded px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-700" placeholder="name" value={name} onChange={e=>setName(e.target.value)} required />
        <input className="border border-slate-300 rounded px-3 py-2 text-sm mono dark:bg-slate-800 dark:border-slate-700" placeholder="cron expression" value={cron} onChange={e=>setCron(e.target.value)} required />
        <input className="border border-slate-300 rounded px-3 py-2 text-sm mono dark:bg-slate-800 dark:border-slate-700" placeholder="command" value={cmd} onChange={e=>setCmd(e.target.value)} required />
      </div>
      <button disabled={busy} className="mt-3 bg-orange-600 text-white text-sm px-4 py-2 rounded hover:bg-orange-700 disabled:opacity-50">
        {busy ? "creating…" : "Create"}
      </button>
      {err && <div className="mt-2 text-red-600 text-sm">{err}</div>}
    </form>
  );
}

function stateColor(s) {
  if (s === 'success') return 'text-green-600';
  if (s === 'failed' || s === 'lost') return 'text-red-600';
  if (s === 'running') return 'text-blue-600';
  if (s === 'killed') return 'text-orange-600';
  return 'text-slate-600';
}

function RunDetail({ runId, onClose }) {
  const [logs, setLogs] = useState([]);
  const [run, setRun] = useState(null);
  const [live, setLive] = useState(false);
  const seqRef = useRef(0);
  const wsRef = useRef(null);

  async function fetchRunMeta() {
    try {
      const r = await api("GET", `/runs/${runId}`);
      setRun(r);
    } catch (_) {}
  }

  useEffect(() => {
    setLogs([]);
    seqRef.current = 0;
    fetchRunMeta();

    const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${window.location.host}/api/v1/runs/${runId}/logs/ws?from_seq=0`;
    const ws = new WebSocket(url);
    wsRef.current = ws;

    ws.onopen = () => setLive(true);
    ws.onclose = () => { setLive(false); fetchRunMeta(); };
    ws.onerror = () => setLive(false);
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'log') {
          seqRef.current = msg.seq + 1;
          setLogs(prev => [...prev, msg]);
        } else if (msg.type === 'end') {
          setLive(false);
          fetchRunMeta();
        }
      } catch (_) {}
    };

    // Refresh run metadata periodically so state badge updates.
    const metaTick = setInterval(fetchRunMeta, 4000);
    return () => {
      clearInterval(metaTick);
      try { ws.close(); } catch (_) {}
    };
  }, [runId]);

  return (
    <div className="mt-3 border-t border-slate-200 pt-3">
      <div className="flex items-center justify-between mb-2">
        <span className="text-xs font-semibold text-slate-600">
          Run detail: <span className="mono">{runId}</span>
          {live && <span className="ml-2 inline-flex items-center text-emerald-600">
            <span className="w-2 h-2 rounded-full bg-emerald-500 mr-1 animate-pulse"></span>live
          </span>}
        </span>
        <button onClick={onClose} className="text-xs text-slate-400 hover:text-slate-700">hide</button>
      </div>
      {run && (
        <div className="text-xs text-slate-500 flex gap-4 mb-2 flex-wrap">
          <span className={stateColor(run.state)}>{run.state}</span>
          <span>attempt {run.attempt}</span>
          {run.exit_code != null && <span>exit {run.exit_code}</span>}
          {run.log_bytes > 0 && <span>{(run.log_bytes/1024).toFixed(1)} KB log</span>}
          {run.log_truncated && <span className="text-amber-600">TRUNCATED</span>}
          {run.peak_rss_bytes && <span title="peak resident set size">RSS {(run.peak_rss_bytes/1024/1024).toFixed(1)} MB</span>}
          {(run.cpu_user_secs != null || run.cpu_sys_secs != null) && (
            <span title="cumulative user + sys CPU seconds">
              CPU {((run.cpu_user_secs||0)+(run.cpu_sys_secs||0)).toFixed(2)}s
            </span>
          )}
        </div>
      )}
      <div className="bg-black rounded p-3 font-mono text-xs overflow-auto max-h-64">
        {logs.length === 0 && <span className="text-slate-500">no output yet</span>}
        {logs.map(l => (
          <div key={l.seq} className={l.stream === 'stdout' ? 'text-green-300' : 'text-red-400'}>
            {l.chunk}
          </div>
        ))}
      </div>
    </div>
  );
}

function outcomeColor(o) {
  if (o === 'success') return '#22c55e';
  if (o === 'failure') return '#ef4444';
  if (o === 'running') return '#f59e0b';
  return '#94a3b8';
}

function Sparkline({ outcomes }) {
  if (!outcomes || outcomes.length === 0) return null;
  return (
    <div style={{ display: 'flex', gap: '2px', alignItems: 'center' }}>
      {outcomes.map((o, i) => (
        <span key={i} title={o} style={{
          display: 'inline-block',
          width: '5px',
          height: '10px',
          borderRadius: '1px',
          backgroundColor: outcomeColor(o),
        }} />
      ))}
    </div>
  );
}

function JobRow({ job, onChange }) {
  const [runs, setRuns] = useState(null);
  const [expandedRun, setExpandedRun] = useState(null);
  const [editing, setEditing] = useState(false);
  const [stats, setStats] = useState(null);

  useEffect(() => {
    let cancelled = false;
    async function fetchStats() {
      try {
        const s = await api("GET", `/stats/jobs/${job.id}`);
        if (!cancelled) setStats(s);
      } catch (_) {}
    }
    fetchStats();
    const id = setInterval(fetchStats, 10000);
    return () => { cancelled = true; clearInterval(id); };
  }, [job.id]);

  async function act(path) {
    await api("POST", `/jobs/${job.id}/${path}`);
    onChange();
  }
  async function loadRuns() {
    const r = await api("GET", `/jobs/${job.id}/runs`);
    setRuns(r);
  }
  return (
    <>
      {editing && (
        <JobEditModal
          job={job}
          onClose={() => setEditing(false)}
          onSaved={onChange}
        />
      )}
    <div className="bg-white border border-slate-200 rounded-xl p-4 mb-3 shadow-sm dark:bg-slate-900 dark:border-slate-800">
      <div className="flex items-center justify-between">
        <div>
          <div className="font-semibold">{job.name} {job.paused && <span className="text-xs bg-amber-100 text-amber-800 px-2 py-0.5 rounded ml-2">paused</span>}</div>
          <div className="text-xs text-slate-500 mono">{job.id}</div>
          <div className="text-sm mt-1 mono text-slate-700">{job.cmd}</div>
        </div>
        <div className="flex gap-2">
          <button onClick={() => act("trigger")} className="text-xs bg-orange-100 text-orange-700 px-3 py-1 rounded hover:bg-orange-200">Trigger</button>
          {job.paused
            ? <button onClick={() => act("resume")} className="text-xs bg-green-100 text-green-700 px-3 py-1 rounded hover:bg-green-200">Resume</button>
            : <button onClick={() => act("pause")} className="text-xs bg-slate-100 text-slate-700 px-3 py-1 rounded hover:bg-slate-200">Pause</button>}
          <button onClick={() => setEditing(true)} className="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded hover:bg-blue-200">Edit</button>
          <button onClick={loadRuns} className="text-xs border border-slate-300 px-3 py-1 rounded hover:bg-slate-50">Runs</button>
        </div>
      </div>
      <div className="mt-2 text-xs text-slate-500 flex gap-4">
        <span>trigger: <span className="mono">{job.trigger.kind}</span></span>
        {job.next_fire_at && <span>next: <span className="mono">{new Date(job.next_fire_at).toLocaleString()}</span></span>}
        <span>timeout: <span className="mono">{job.timeout_secs || 'inf'}s</span></span>
        <span>retry: <span className="mono">{job.retry.max_attempts}</span></span>
      </div>
      {stats && (
        <div className="mt-2 flex items-center gap-4 text-xs text-slate-500">
          <span className="font-medium text-slate-700">
            {Math.round(stats.success_rate_24h * 100)}% <span className="font-normal text-slate-400">(24h)</span>
          </span>
          <Sparkline outcomes={stats.recent_outcomes} />
          <span className="text-slate-400">
            p50: {stats.p50_duration_secs.toFixed(1)}s&nbsp;&nbsp;p99: {stats.p99_duration_secs.toFixed(1)}s
          </span>
          {stats.last_failure_at && (
            <span className="text-red-400">last fail: {new Date(stats.last_failure_at).toLocaleString()}</span>
          )}
        </div>
      )}
      {runs && (
        <div className="mt-3 border-t border-slate-100 pt-2">
          <div className="text-xs font-semibold text-slate-600 mb-2">Recent runs ({runs.length})</div>
          {runs.length === 0 && <div className="text-xs text-slate-400">none</div>}
          {runs.map(r => (
            <div key={r.id} className="text-xs flex gap-3 py-1 mono items-center">
              <span className={stateColor(r.state)}>{r.state}</span>
              <span className="text-slate-500">attempt {r.attempt}</span>
              <span className="text-slate-400">{new Date(r.queued_at).toLocaleString()}</span>
              <button
                onClick={() => setExpandedRun(expandedRun === r.id ? null : r.id)}
                className="text-xs border border-slate-300 px-2 py-0.5 rounded hover:bg-slate-50 ml-auto"
              >
                {expandedRun === r.id ? 'Hide' : 'View'}
              </button>
            </div>
          ))}
        </div>
      )}
      {expandedRun && <RunDetail runId={expandedRun} onClose={() => setExpandedRun(null)} />}
    </div>
    </>
  );
}

function JobEditModal({ job, onClose, onSaved }) {
  const editorRef = useRef(null);
  const cmRef = useRef(null);
  const [saveErr, setSaveErr] = useState(null);
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    if (!editorRef.current || cmRef.current) return;
    cmRef.current = CodeMirror(editorRef.current, {
      value: JSON.stringify(job, null, 2),
      mode: { name: "javascript", json: true },
      lineNumbers: true,
      tabSize: 2,
      indentWithTabs: false,
      lineWrapping: false,
    });
  }, []);

  async function save() {
    setSaveErr(null);
    const raw = cmRef.current ? cmRef.current.getValue() : "{}";
    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch (e) {
      setSaveErr("Invalid JSON: " + e.message);
      return;
    }
    setBusy(true);
    try {
      await api("PUT", `/jobs/${job.id}`, parsed);
      onSaved();
      onClose();
    } catch (e) {
      setSaveErr(e.message);
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
      <div className="bg-slate-900 rounded-xl shadow-2xl w-full max-w-2xl flex flex-col" style={{maxHeight:"90vh"}}>
        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-700">
          <h2 className="text-white font-semibold text-base">Edit Job: <span className="text-orange-400">{job.name}</span></h2>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-xl leading-none">&times;</button>
        </div>
        <div className="px-5 py-4 flex-1 overflow-auto">
          <div ref={editorRef} className="rounded overflow-hidden" />
          {saveErr && (
            <div className="mt-3 bg-red-900/40 border border-red-700 text-red-300 text-sm px-3 py-2 rounded">
              {saveErr}
            </div>
          )}
        </div>
        <div className="flex justify-end gap-3 px-5 py-4 border-t border-slate-700">
          <button
            onClick={onClose}
            className="text-sm text-slate-300 px-4 py-2 rounded border border-slate-600 hover:bg-slate-800"
          >
            Cancel
          </button>
          <button
            onClick={save}
            disabled={busy}
            className="text-sm bg-orange-600 text-white px-4 py-2 rounded hover:bg-orange-700 disabled:opacity-50"
          >
            {busy ? "Saving…" : "Save"}
          </button>
        </div>
      </div>
    </div>
  );
}

function Login({ onLoggedIn }) {
  const [username, setUsername] = useState("admin");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState(null);
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setErr(null);
    setBusy(true);
    try {
      const resp = await fetch(API + "/auth/login", {
        method: "POST",
        headers: { "content-type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ username, password }),
      });
      if (!resp.ok) {
        setErr("invalid credentials");
        setBusy(false);
        return;
      }
      const me = await resp.json();
      onLoggedIn(me);
    } catch (e) {
      setErr(e.message);
      setBusy(false);
    }
  }

  return (
    <div className="min-h-screen flex items-center justify-center bg-slate-100 dark:bg-slate-950">
      <form onSubmit={submit} className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm w-full max-w-sm dark:bg-slate-900 dark:border-slate-800">
        <div className="flex items-center gap-2 mb-4">
          <span className="text-2xl">⚙️</span>
          <h1 className="text-xl font-bold">rusty-sched</h1>
        </div>
        <label className="block text-xs text-slate-600 mb-1">Username</label>
        <input className="w-full border border-slate-300 rounded px-3 py-2 text-sm mb-3" value={username} onChange={e=>setUsername(e.target.value)} required />
        <label className="block text-xs text-slate-600 mb-1">Password</label>
        <input type="password" className="w-full border border-slate-300 rounded px-3 py-2 text-sm mb-4" value={password} onChange={e=>setPassword(e.target.value)} required />
        <button disabled={busy} className="w-full bg-orange-600 text-white text-sm px-4 py-2 rounded hover:bg-orange-700 disabled:opacity-50">
          {busy ? "signing in…" : "Sign in"}
        </button>
        {err && <div className="mt-3 text-red-600 text-sm">{err}</div>}
        <p className="mt-4 text-xs text-slate-500">
          First run? Default user is <span className="mono">admin</span>. Password from
          <span className="mono"> RSCHED_ADMIN_PASSWORD</span> env var or auto-generated (check server logs).
        </p>
      </form>
    </div>
  );
}

function ThemeToggle() {
  const [dark, setDark] = useState(() => document.documentElement.classList.contains('dark'));
  function toggle() {
    const next = !dark;
    setDark(next);
    if (next) {
      document.documentElement.classList.add('dark');
      localStorage.setItem('rsched_theme', 'dark');
    } else {
      document.documentElement.classList.remove('dark');
      localStorage.setItem('rsched_theme', 'light');
    }
  }
  return (
    <button onClick={toggle} title="toggle theme" className="text-orange-100 hover:text-white">
      {dark ? '☀' : '☾'}
    </button>
  );
}

function HeaderWithUser({ me, onLogout, tab, setTab }) {
  const tabs = [
    { id: 'jobs', label: 'Jobs' },
    { id: 'resources', label: 'Resources' },
    { id: 'globals', label: 'Globals' },
    { id: 'apikeys', label: 'API keys' },
  ];
  if (me.role === 'admin') {
    tabs.push({ id: 'users', label: 'Users' });
    tabs.push({ id: 'audit', label: 'Audit' });
  }
  return (
    <header className="bg-gradient-to-r from-orange-500 to-red-600 text-white shadow">
      <div className="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <span className="text-2xl">⚙️</span>
          <h1 className="text-xl font-bold">rusty-sched</h1>
          <span className="text-orange-200 text-sm hidden md:inline">job scheduler</span>
        </div>
        <div className="flex items-center gap-4 text-sm">
          <ThemeToggle />
          <span className="hidden md:inline">{me.username} <span className="text-orange-200">({me.role})</span></span>
          <a href="https://github.com/jdp5949/rusty-sched" className="hover:underline hidden md:inline">★ GitHub</a>
          <button onClick={onLogout} className="text-xs text-orange-100 hover:text-white underline">logout</button>
        </div>
      </div>
      <nav className="max-w-6xl mx-auto px-6 flex gap-1 text-sm">
        {tabs.map(t => (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            className={`px-3 py-2 rounded-t ${tab === t.id ? 'bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100' : 'text-white/80 hover:text-white'}`}
          >
            {t.label}
          </button>
        ))}
      </nav>
    </header>
  );
}

function ApiKeysPage() {
  const [keys, setKeys] = useState([]);
  const [name, setName] = useState("");
  const [created, setCreated] = useState(null);
  const [err, setErr] = useState(null);
  async function load() {
    try { setKeys(await api("GET", "/auth/api-keys")); } catch (e) { setErr(e.message); }
  }
  useEffect(() => { load(); }, []);
  async function create(e) {
    e.preventDefault();
    setErr(null);
    try {
      const k = await api("POST", "/auth/api-keys", { name });
      setCreated(k);
      setName("");
      load();
    } catch (e) { setErr(e.message); }
  }
  async function del(id) {
    if (!confirm('Delete this key? Sessions using it will stop working immediately.')) return;
    try { await api("DELETE", `/auth/api-keys/${id}`); load(); } catch (e) { setErr(e.message); }
  }
  return (
    <div>
      <form onSubmit={create} className="bg-white border border-slate-200 rounded-xl p-5 mb-6 shadow-sm dark:bg-slate-900 dark:border-slate-800">
        <h2 className="font-semibold mb-3">Create API key</h2>
        <div className="grid md:grid-cols-3 gap-3">
          <input className="border border-slate-300 rounded px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-700" placeholder="name (e.g. ci, monitoring)" value={name} onChange={e=>setName(e.target.value)} required />
          <button className="bg-orange-600 text-white text-sm px-4 py-2 rounded hover:bg-orange-700">Create</button>
        </div>
        {created && (
          <div className="mt-3 p-3 bg-amber-50 border border-amber-200 text-amber-900 rounded text-sm dark:bg-amber-900/30 dark:border-amber-800 dark:text-amber-100">
            <div className="font-semibold mb-1">Token created — copy it now, you won't see it again:</div>
            <div className="mono break-all bg-white dark:bg-slate-950 p-2 rounded">{created.token}</div>
            <button className="text-xs mt-2 underline" onClick={() => setCreated(null)}>I've copied it, dismiss</button>
          </div>
        )}
        {err && <div className="mt-2 text-red-600 text-sm">{err}</div>}
      </form>
      <table className="w-full text-sm bg-white border border-slate-200 rounded shadow-sm dark:bg-slate-900 dark:border-slate-800">
        <thead className="text-xs uppercase text-slate-500 dark:text-slate-400">
          <tr><th className="text-left p-3">Name</th><th className="text-left p-3">Created</th><th className="text-left p-3">Last used</th><th className="p-3"></th></tr>
        </thead>
        <tbody>
          {keys.length === 0 && <tr><td colSpan="4" className="p-3 text-slate-500">No keys yet.</td></tr>}
          {keys.map(k => (
            <tr key={k.id} className="border-t border-slate-100 dark:border-slate-800">
              <td className="p-3">{k.name}</td>
              <td className="p-3 mono text-xs">{k.created_at}</td>
              <td className="p-3 mono text-xs">{k.last_used_at || <span className="text-slate-400">never</span>}</td>
              <td className="p-3 text-right"><button onClick={() => del(k.id)} className="text-red-600 hover:underline text-xs">delete</button></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function UsersPage() {
  const [users, setUsers] = useState([]);
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [role, setRole] = useState("operator");
  const [err, setErr] = useState(null);
  async function load() {
    try { setUsers(await api("GET", "/users")); } catch (e) { setErr(e.message); }
  }
  useEffect(() => { load(); }, []);
  async function create(e) {
    e.preventDefault();
    setErr(null);
    try {
      await api("POST", "/users", { username, password, role });
      setUsername(""); setPassword(""); load();
    } catch (e) { setErr(e.message); }
  }
  return (
    <div>
      <form onSubmit={create} className="bg-white border border-slate-200 rounded-xl p-5 mb-6 shadow-sm dark:bg-slate-900 dark:border-slate-800">
        <h2 className="font-semibold mb-3">Create user</h2>
        <div className="grid md:grid-cols-4 gap-3">
          <input className="border border-slate-300 rounded px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-700" placeholder="username" value={username} onChange={e=>setUsername(e.target.value)} required />
          <input type="password" className="border border-slate-300 rounded px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-700" placeholder="password (≥8 chars)" value={password} onChange={e=>setPassword(e.target.value)} required />
          <select className="border border-slate-300 rounded px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-700" value={role} onChange={e=>setRole(e.target.value)}>
            <option value="admin">admin</option>
            <option value="operator">operator</option>
            <option value="viewer">viewer</option>
          </select>
          <button className="bg-orange-600 text-white text-sm px-4 py-2 rounded hover:bg-orange-700">Create</button>
        </div>
        {err && <div className="mt-2 text-red-600 text-sm">{err}</div>}
      </form>
      <table className="w-full text-sm bg-white border border-slate-200 rounded shadow-sm dark:bg-slate-900 dark:border-slate-800">
        <thead className="text-xs uppercase text-slate-500 dark:text-slate-400">
          <tr><th className="text-left p-3">Username</th><th className="text-left p-3">Role</th><th className="text-left p-3">Status</th></tr>
        </thead>
        <tbody>
          {users.map(u => (
            <tr key={u.id} className="border-t border-slate-100 dark:border-slate-800">
              <td className="p-3 mono">{u.username}</td>
              <td className="p-3">{u.role}</td>
              <td className="p-3">{u.disabled ? <span className="text-red-600">disabled</span> : <span className="text-green-600">active</span>}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

function AuditPage() {
  const [entries, setEntries] = useState([]);
  const [err, setErr] = useState(null);
  async function load() {
    try { setEntries(await api("GET", "/audit")); } catch (e) { setErr(e.message); }

  useEffect(() => { load(); const id = setInterval(load, 10000); return () => clearInterval(id); }, []);
  return (
    <div>
      <div className="flex justify-between items-center mb-3">
        <h2 className="font-semibold">Audit log <span className="text-slate-500 text-sm">({entries.length})</span></h2>
        <button onClick={load} className="text-xs text-slate-600 hover:text-slate-900 dark:text-slate-300">↻ refresh</button>
      </div>
      {err && <div className="text-red-600 text-sm">{err}</div>}
      <table className="w-full text-sm bg-white border border-slate-200 rounded shadow-sm dark:bg-slate-900 dark:border-slate-800">
        <thead className="text-xs uppercase text-slate-500 dark:text-slate-400">
          <tr>
            <th className="text-left p-3">Time</th>
            <th className="text-left p-3">User</th>
            <th className="text-left p-3">Action</th>
            <th className="text-left p-3">Target</th>
            <th className="text-left p-3">Payload</th>
          </tr>
        </thead>

          {entries.length === 0 && <tr><td colSpan="5" className="p-3 text-slate-500">No audit entries.</td></tr>}

            <tr key={e.id} className="border-t border-slate-100 dark:border-slate-800">
              <td className="p-3 mono text-xs whitespace-nowrap">{e.ts}</td>
              <td className="p-3 mono text-xs">{e.user_id || <span className="text-slate-400">system</span>}</td>
              <td className="p-3">{e.action}</td>
              <td className="p-3 mono text-xs">{e.target_type}{e.target_id ? `:${e.target_id.slice(0, 8)}…` : ''}</td>
              <td className="p-3 mono text-xs">{e.payload_json || ''}</td>
            </tr>

function JobsPage() {
  const [jobs, setJobs] = useState(null);
  const [filter, setFilter] = useState("");
  const [err, setErr] = useState(null);

  async function load() {
    try {
      setJobs(await api("GET", "/jobs"));
      setErr(null);
    } catch (e) { setErr(e.message); }
  }
  useEffect(() => { load(); const id = setInterval(load, 5000); return () => clearInterval(id); }, []);

  const filtered = jobs && filter
    ? jobs.filter(j => j.name.toLowerCase().includes(filter.toLowerCase()) || j.cmd.toLowerCase().includes(filter.toLowerCase()))
    : jobs;

  return (
    <>
      <NewJobForm onCreated={load} />
      <div className="flex items-center justify-between mb-3 gap-3">
        <h2 className="font-semibold whitespace-nowrap">Jobs {jobs && <span className="text-slate-500 text-sm">({filtered.length}{filter && jobs.length !== filtered.length ? `/${jobs.length}` : ''})</span>}</h2>
        <input
          className="flex-1 max-w-xs border border-slate-300 rounded px-3 py-1 text-sm dark:bg-slate-800 dark:border-slate-700"
          placeholder="filter by name or command…"
          value={filter}
          onChange={e=>setFilter(e.target.value)}
        />
        <button onClick={load} className="text-xs text-slate-600 hover:text-slate-900 dark:text-slate-300">↻ refresh</button>
      </div>
      {err && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded text-sm mb-3 dark:bg-red-900/30 dark:border-red-800 dark:text-red-200">{err}</div>}
      {jobs === null && <div className="text-slate-500 text-sm">loading…</div>}
      {jobs && jobs.length === 0 && <div className="text-slate-500 text-sm">No jobs yet. Create one above.</div>}
      {filtered && filtered.map(j => <JobRow key={j.id} job={j} onChange={load} />)}
    </>
  );
}

function ResourcesPage() {
  const [rows, setRows] = useState([]);
  const [name, setName] = useState("");
  const [capacity, setCapacity] = useState("");
  const [description, setDescription] = useState("");
  const [err, setErr] = useState(null);

  async function load() {
    try { setRows(await api("GET", "/resources")); } catch (e) { setErr(e.message); }
  }
  useEffect(() => { load(); const id = setInterval(load, 4000); return () => clearInterval(id); }, []);

  async function create(e) {
    e.preventDefault();
    setErr(null);
    try {
      await api("POST", "/resources", { name, capacity: parseInt(capacity, 10), description: description || null });
      setName(""); setCapacity(""); setDescription("");
      load();
    } catch (e) { setErr(e.message); }
  }

  async function del(n) {
    if (!confirm(`Delete resource "${n}"? Any holds will be released.`)) return;
    try { await api("DELETE", `/resources/${encodeURIComponent(n)}`); load(); } catch (e) { setErr(e.message); }
  }

  return (
    <div>
      <form onSubmit={create} className="bg-white border border-slate-200 rounded-xl p-5 mb-6 shadow-sm dark:bg-slate-900 dark:border-slate-800">
        <h2 className="font-semibold mb-3">Create virtual resource</h2>
        <div className="grid md:grid-cols-4 gap-3">
          <input className="border border-slate-300 rounded px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-700" placeholder="name (e.g. db.connections)" value={name} onChange={e=>setName(e.target.value)} required />
          <input type="number" min="1" className="border border-slate-300 rounded px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-700" placeholder="capacity" value={capacity} onChange={e=>setCapacity(e.target.value)} required />
          <input className="border border-slate-300 rounded px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-700" placeholder="description (optional)" value={description} onChange={e=>setDescription(e.target.value)} />
          <button className="bg-orange-600 text-white text-sm px-4 py-2 rounded hover:bg-orange-700">Create</button>
        </div>
        {err && <div className="mt-2 text-red-600 text-sm">{err}</div>}
      </form>
      <table className="w-full text-sm bg-white border border-slate-200 rounded shadow-sm dark:bg-slate-900 dark:border-slate-800">
        <thead className="text-xs uppercase text-slate-500 dark:text-slate-400">
          <tr>
            <th className="text-left p-3">Name</th>
            <th className="text-left p-3">Capacity</th>
            <th className="text-left p-3">Available</th>
            <th className="text-left p-3">In use</th>
            <th className="text-left p-3">Description</th>
            <th className="p-3"></th>
          </tr>
        </thead>
        <tbody>
          {rows.length === 0 && <tr><td colSpan="6" className="p-3 text-slate-500">No resources yet.</td></tr>}
          {rows.map(r => {
            const inUse = r.capacity - r.available;
            const pct = r.capacity > 0 ? Math.round((inUse / r.capacity) * 100) : 0;
            return (
              <tr key={r.id} className="border-t border-slate-100 dark:border-slate-800">
                <td className="p-3 mono">{r.name}</td>
                <td className="p-3">{r.capacity}</td>
                <td className="p-3 text-green-600">{r.available}</td>
                <td className="p-3">
                  <div className="flex items-center gap-2">
                    <div className="w-24 h-2 bg-slate-200 dark:bg-slate-800 rounded">
                      <div className="h-2 bg-orange-500 rounded" style={{width: `${pct}%`}}></div>
                    </div>
                    <span className="text-xs">{inUse}/{r.capacity}</span>
                  </div>
                </td>
                <td className="p-3 text-slate-500">{r.description || ''}</td>
                <td className="p-3 text-right"><button onClick={() => del(r.name)} className="text-red-600 hover:underline text-xs">delete</button></td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function GlobalsPage() {
  const [rows, setRows] = useState([]);
  const [name, setName] = useState("");
  const [value, setValue] = useState("");
  const [err, setErr] = useState(null);

  async function load() {
    try { setRows(await api("GET", "/globals")); } catch (e) { setErr(e.message); }
  }
  useEffect(() => { load(); const id = setInterval(load, 5000); return () => clearInterval(id); }, []);

  async function setVar(e) {
    e.preventDefault();
    setErr(null);
    try {
      await api("POST", "/globals", { name, value });
      setName(""); setValue(""); load();
    } catch (e) { setErr(e.message); }
  }

  async function del(n) {
    if (!confirm(`Delete global "${n}"?`)) return;
    try { await api("DELETE", `/globals/${encodeURIComponent(n)}`); load(); } catch (e) { setErr(e.message); }
  }

  return (
    <div>
      <form onSubmit={setVar} className="bg-white border border-slate-200 rounded-xl p-5 mb-6 shadow-sm dark:bg-slate-900 dark:border-slate-800">
        <h2 className="font-semibold mb-3">Set global variable</h2>
        <p className="text-xs text-slate-500 mb-3">Used by Autosys-style <span className="mono">value(name)</span> in condition expressions. Truthy values: <span className="mono">y / yes / true / 1</span>.</p>
        <div className="grid md:grid-cols-3 gap-3">
          <input className="border border-slate-300 rounded px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-700" placeholder="name (e.g. IS_RUN_DAY)" value={name} onChange={e=>setName(e.target.value)} required />
          <input className="border border-slate-300 rounded px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-700" placeholder="value" value={value} onChange={e=>setValue(e.target.value)} required />
          <button className="bg-orange-600 text-white text-sm px-4 py-2 rounded hover:bg-orange-700">Set</button>
        </div>
        {err && <div className="mt-2 text-red-600 text-sm">{err}</div>}
      </form>
      <table className="w-full text-sm bg-white border border-slate-200 rounded shadow-sm dark:bg-slate-900 dark:border-slate-800">
        <thead className="text-xs uppercase text-slate-500 dark:text-slate-400">
          <tr><th className="text-left p-3">Name</th><th className="text-left p-3">Value</th><th className="text-left p-3">Updated</th><th className="p-3"></th></tr>
        </thead>
        <tbody>
          {rows.length === 0 && <tr><td colSpan="4" className="p-3 text-slate-500">No globals set.</td></tr>}
          {rows.map(g => (
            <tr key={g.name} className="border-t border-slate-100 dark:border-slate-800">
              <td className="p-3 mono">{g.name}</td>
              <td className="p-3 mono">{g.value}</td>
              <td className="p-3 mono text-xs">{g.updated_at}</td>
              <td className="p-3 text-right"><button onClick={() => del(g.name)} className="text-red-600 hover:underline text-xs">delete</button></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function App() {
  const [me, setMe] = useState(undefined);
  const [tab, setTab] = useState('jobs');

  async function checkAuth() {
    try {
      const resp = await fetch(API + "/auth/me", { credentials: "same-origin" });
      if (resp.status === 401) { setMe(null); return; }
      if (!resp.ok) throw new Error("auth check failed");
      setMe(await resp.json());
    } catch (e) {
      setMe(null);
    }
  }

  async function logout() {
    await fetch(API + "/auth/logout", { method: "POST", credentials: "same-origin" });
    setMe(null);
  }

  useEffect(() => { checkAuth(); }, []);

  if (me === undefined) {
    return <div className="min-h-screen flex items-center justify-center text-slate-500">loading…</div>;
  }
  if (me === null) {
    return <Login onLoggedIn={(u) => setMe(u)} />;
  }

  return (
    <>
      <HeaderWithUser me={me} onLogout={logout} tab={tab} setTab={setTab} />
      <div className="max-w-6xl mx-auto px-6 py-6">
        {tab === 'jobs' && <JobsPage />}
        {tab === 'resources' && <ResourcesPage />}
        {tab === 'globals' && <GlobalsPage />}
        {tab === 'apikeys' && <ApiKeysPage />}
        {tab === 'users' && me.role === 'admin' && <UsersPage />}
        {tab === 'audit' && me.role === 'admin' && <AuditPage />}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
